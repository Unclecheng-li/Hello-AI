name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Show tool versions
        run: |
          python --version
          python -m pip --version
          python -m mkdocs --version

      - name: Validate helper scripts
        run: |
          python scripts/check_links.py
          python scripts/validate_assets.py

      - name: Build site
        run: |
          set -o pipefail
          python -m mkdocs build --strict --verbose 2>&1 | tee mkdocs-build.log

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-build-log
          path: mkdocs-build.log

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  server-deploy:
    needs: build
    if: ${{ vars.ENABLE_SERVER_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Server deploy placeholder
        run: |
          echo "Set ENABLE_SERVER_DEPLOY=true and add server deployment steps when the Nginx host is ready."
