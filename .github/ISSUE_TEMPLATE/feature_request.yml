name: 内容建议
description: 提出新增章节、实验或结构优化建议
title: "[建议] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: 建议内容
      description: 你希望增加或调整什么。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 原因
      description: 说明这个建议为什么有价值。
