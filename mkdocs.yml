site_name: Hello-AI
site_url: https://unclecheng-li.github.io/Hello-AI/
site_author: Hello-AI Team
site_description: 面向中文学习者的 AI / LLM 学习入口平台

repo_name: Hello-AI
repo_url: https://github.com/Unclecheng-li/Hello-AI
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Hello-AI Team

theme:
  name: material
  language: zh
  custom_dir: overrides
  features:
    - content.action.edit
    - content.code.copy
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg

plugins:
  - search

extra:
  generator: false
  analytics:
    feedback:
      title: 这页有帮助吗？
      ratings:
        - icon: material/emoticon-happy-outline
          name: 有帮助
          data: helpful
          note: 感谢反馈。你也可以通过页面下方的共建入口继续补充内容。
        - icon: material/emoticon-sad-outline
          name: 需要改进
          data: needs-improvement
          note: 感谢反馈。欢迎通过页面下方的勘误或建议入口提出修改建议。

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

